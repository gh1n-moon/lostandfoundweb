<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Kategori - Lost & Found UNIPOL</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .kategori-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        .btn-kembali {
            display: inline-block;
            margin-bottom: 20px;
            color: #047857;
            text-decoration: none;
            font-weight: 500;
        }
        .form-tambah {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .form-tambah input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .form-tambah button {
            background-color: #047857;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .form-tambah button:hover {
            background-color: #065f46;
        }
        .tabel-kategori {
            width: 100%;
            border-collapse: collapse;
        }
        .tabel-kategori th, .tabel-kategori td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        .tabel-kategori th {
            background-color: #f9fafb;
            color: #374151;
            font-weight: 600;
        }
        .btn-hapus {
            color: #dc2626;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .btn-hapus:hover {
            text-decoration: underline;
        }
        .alert-error {
            background-color: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            border: 1px solid #fca5a5;
        }
    </style>
</head>
<body>

    <div class="kategori-container">
        <a href="{{ url_for('index', role=role) }}" class="btn-kembali">⬅️ Kembali ke Halaman Utama</a>
        
        <h2>Kelola Kategori Barang</h2>
        <p style="color: #6b7280; font-size: 14px; margin-bottom: 20px;">
            Halaman khusus Admin untuk menambah atau menghapus kategori secara dinamis.
        </p>

        {% if error %}
            <div class="alert-error">
                ⚠️ {{ error }}
            </div>
        {% endif %}

        <form action="{{ url_for('kelola_kategori', role=role) }}" method="POST" class="form-tambah">
            <input type="text" name="nama_kategori_baru" placeholder="Contoh: Alat Tulis, Pakaian, Kosmetik" required>
            <button type="submit">Tambah</button>
        </form>

        <table class="tabel-kategori">
            <thead>
                <tr>
                    <th>No.</th>
                    <th>Nama Kategori</th>
                    <th style="text-align: center;">Aksi</th>
                </tr>
            </thead>
            <tbody>
                {% for kat in kategori_list %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td><strong>{{ kat['nama_kategori'] }}</strong></td>
                    <td style="text-align: center;">
                        <a href="{{ url_for('hapus_kategori', kat_id=kat['id'], role=role) }}" 
                           class="btn-hapus" 
                           onclick="return confirm('Apakah Anda yakin ingin menghapus kategori ini? Semua form yang menggunakan kategori ini mungkin perlu disesuaikan kembali.')">
                            Hapus
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
